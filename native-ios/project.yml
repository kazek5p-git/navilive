name: NaviLive

options:
  minimumXcodeGenVersion: 2.38.0

targets:
  NaviLive:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    scheme:
      testTargets:
        - NaviLiveTests
    sources:
      - path: NaviLive/Sources
      - path: NaviLive/Resources
    info:
      path: NaviLive/Info.plist
      properties:
        CFBundleDisplayName: Navi Live
        CFBundleShortVersionString: "1.0.1"
        CFBundleVersion: "38"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - location
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: Navi Live uses your location to search nearby places and guide walking routes.
        NSLocationAlwaysAndWhenInUseUsageDescription: Navi Live can keep guiding your route when the screen is dimmed during navigation.
        NSMotionUsageDescription: Navi Live uses device motion to help align the initial walking direction and detect the shake gesture for repeating instructions.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kazek.navilive
        CURRENT_PROJECT_VERSION: 38
        MARKETING_VERSION: 1.0.1
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  NaviLiveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: NaviLiveTests
    dependencies:
      - target: NaviLive
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.kazek.navilive.tests
        SWIFT_VERSION: 5.10
