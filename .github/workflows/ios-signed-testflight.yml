name: iOS Signed IPA + TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Upload exported IPA to App Store Connect TestFlight"
        required: true
        default: true
        type: boolean
      build_number_override:
        description: "Optional explicit CFBundleVersion override for the exported build"
        required: false
        default: ""
        type: string

jobs:
  build-signed-ipa:
    runs-on: macos-15
    permissions:
      contents: read
    concurrency:
      group: navi-live-ios-signed-${{ github.ref }}
      cancel-in-progress: true
    env:
      IOS_BUNDLE_ID: com.kazek.navilive
      IOS_SCHEME: NaviLive
      IOS_PROJECT: native-ios/NaviLive.xcodeproj
      ARCHIVE_PATH: native-ios/build/NaviLive.xcarchive
      EXPORT_PATH: native-ios/build/export
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
      IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26 or newer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          apps = []
          pattern = re.compile(r"Xcode(?:_([0-9]+(?:\.[0-9]+)*))?\.app$")

          for name in os.listdir("/Applications"):
              match = pattern.fullmatch(name)
              if not match:
                  continue
              version_text = match.group(1)
              if not version_text:
                  continue
              parts = tuple(int(part) for part in version_text.split("."))
              apps.append((parts, f"/Applications/{name}"))

          apps.sort()
          selected = None
          for parts, path in apps:
              if parts[0] >= 26:
                  selected = (parts, path)

          if selected is None:
              print("::error::Xcode 26 or newer is not installed on this runner.")
              sys.exit(1)

          version_parts, xcode_path = selected
          developer_dir = f"{xcode_path}/Contents/Developer"
          subprocess.run(["sudo", "xcode-select", "-s", developer_dir], check=True)
          subprocess.run(["xcodebuild", "-version"], check=True)
          subprocess.run(["xcrun", "--sdk", "iphoneos", "--show-sdk-version"], check=True)
          PY

      - name: Resolve temp paths
        shell: bash
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/navi-live-signing.keychain-db" >> "$GITHUB_ENV"

      - name: Resolve build number
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.build_number_override }}" ]; then
            echo "CI_BUILD_NUMBER=${{ github.event.inputs.build_number_override }}" >> "$GITHUB_ENV"
          else
            CI_BUILD_NUMBER=$(python3 -c 'import re; from pathlib import Path; project = Path("native-ios/project.yml").read_text(encoding="utf-8"); match = re.search(r"^\s*CURRENT_PROJECT_VERSION:\s*\"?([0-9]+)\"?\s*$", project, re.MULTILINE); assert match, "Unable to resolve CURRENT_PROJECT_VERSION from native-ios/project.yml"; print(match.group(1))')
            echo "CI_BUILD_NUMBER=$CI_BUILD_NUMBER" >> "$GITHUB_ENV"
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for var in \
            APPLE_TEAM_ID \
            ASC_KEY_ID \
            ASC_ISSUER_ID \
            ASC_API_KEY_BASE64; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Resolve signing mode
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${IOS_DIST_CERT_P12_BASE64:-}" ] && \
             [ -n "${IOS_DIST_CERT_PASSWORD:-}" ] && \
             [ -n "${IOS_PROVISION_PROFILE_BASE64:-}" ] && \
             [ -n "${KEYCHAIN_PASSWORD:-}" ]; then
            echo "SIGNING_MODE=manual" >> "$GITHUB_ENV"
            echo "EXPORT_SIGNING_STYLE=manual" >> "$GITHUB_ENV"
            echo "EXPORT_METHOD=app-store" >> "$GITHUB_ENV"
          else
            echo "SIGNING_MODE=automatic" >> "$GITHUB_ENV"
            echo "EXPORT_SIGNING_STYLE=automatic" >> "$GITHUB_ENV"
            echo "EXPORT_METHOD=app-store-connect" >> "$GITHUB_ENV"
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Apply build number to project.yml
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          build = os.environ["CI_BUILD_NUMBER"].strip()
          if not re.fullmatch(r"[0-9]+", build):
              raise SystemExit(f"Invalid CI_BUILD_NUMBER: {build!r}")

          path = Path("native-ios/project.yml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r'CFBundleVersion:\s*"[^"]+"', f'CFBundleVersion: "{build}"', text, count=1)
          text = re.sub(r'CURRENT_PROJECT_VERSION:\s*[^\n\r]+', f'CURRENT_PROJECT_VERSION: {build}', text, count=1)
          path.write_text(text, encoding="utf-8")
          print(f"Prepared native-ios/project.yml for build {build}")
          PY

      - name: Generate Xcode project
        run: |
          cd native-ios
          xcodegen generate

      - name: Setup App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Setup signing keychain and certificate
        if: ${{ env.SIGNING_MODE == 'manual' }}
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          echo "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        if: ${{ env.SIGNING_MODE == 'manual' }}
        id: profile
        shell: bash
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")

          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Archive signed app
        if: ${{ env.SIGNING_MODE == 'manual' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf native-ios/build
          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.profile.outputs.profile_name }}" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$CI_BUILD_NUMBER" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            clean archive | tee native-ios-build-signed.log

      - name: Archive signed app automatically
        if: ${{ env.SIGNING_MODE == 'automatic' }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf native-ios/build
          xcodebuild \
            -project "$IOS_PROJECT" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CURRENT_PROJECT_VERSION="$CI_BUILD_NUMBER" \
            clean archive | tee native-ios-build-signed.log

      - name: Export IPA
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import plistlib

          payload = {
              "method": os.environ["EXPORT_METHOD"],
              "signingStyle": os.environ["EXPORT_SIGNING_STYLE"],
              "teamID": os.environ["APPLE_TEAM_ID"],
              "stripSwiftSymbols": True,
              "compileBitcode": False,
              "destination": "export",
          }

          profile_name = os.environ.get("PROFILE_NAME")
          if os.environ["SIGNING_MODE"] == "manual" and profile_name:
              payload["provisioningProfiles"] = {
                  os.environ["IOS_BUNDLE_ID"]: profile_name
              }
          else:
              payload["manageAppVersionAndBuildNumber"] = False

          with open(os.path.join(os.environ["RUNNER_TEMP"], "exportOptions.plist"), "wb") as handle:
              plistlib.dump(payload, handle)
          PY

          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" | tee native-ios-export.log
        env:
          PROFILE_NAME: ${{ steps.profile.outputs.profile_name }}

      - name: Resolve exported IPA path
        id: ipa
        shell: bash
        run: |
          set -euo pipefail
          IPA_PATH=$(find "$EXPORT_PATH" -maxdepth 1 -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA exported in $EXPORT_PATH"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v6
        with:
          name: Navi-Live-signed-ipa
          path: ${{ steps.ipa.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Navi-Live-native-ios-signed-build-logs
          path: |
            native-ios-build-signed.log
            native-ios-export.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          upload_log="$(mktemp)"
          set +e
          xcrun altool \
            --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1 | tee "$upload_log"
          upload_status=${PIPESTATUS[0]}
          set -e
          if [ "$upload_status" -ne 0 ]; then
            exit "$upload_status"
          fi
          if grep -Eqi "UPLOAD FAILED|Validation failed|Failed to upload package" "$upload_log"; then
            echo "altool reported an upload failure despite a zero exit code."
            exit 1
          fi
          if ! grep -Eqi "No errors uploading|Successfully uploaded file" "$upload_log"; then
            echo "altool finished without an explicit upload success confirmation."
            exit 1
          fi

      - name: Cleanup keychain and private key
        if: always()
        shell: bash
        run: |
          set +e
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          if [ "${SIGNING_MODE:-}" = "manual" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
